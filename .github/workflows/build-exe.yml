name: 编译启文安装包

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: 编译 Windows EXE

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 删除旧 lockfile
        run: if (Test-Path package-lock.json) { Remove-Item package-lock.json }
        shell: pwsh

      - name: 安装依赖
        run: npm install

      - name: 构建 React 界面
        run: npm run build:renderer

      - name: 复制主进程入口到 build 目录
        run: |
          Copy-Item -Path electron/main.js -Destination build/electron.js
          Copy-Item -Path electron/preload.js -Destination build/preload.js
        shell: pwsh

      - name: 打包成 Windows EXE
        run: npx electron-builder build --win --config electron-builder.json --publish never

      - name: 上传 EXE 文件
        uses: actions/upload-artifact@v4
        with:
          name: 启文-Windows安装包
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    name: 编译 macOS DMG

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 删除旧 lockfile
        run: rm -f package-lock.json

      - name: 安装依赖
        run: npm install

      - name: 构建 React 界面
        run: npm run build:renderer

      - name: 复制主进程入口到 build 目录
        run: |
          cp electron/main.js build/electron.js
          cp electron/preload.js build/preload.js

      - name: 打包成 macOS DMG
        run: npx electron-builder build --mac --config electron-builder.json --publish never

      - name: 上传 DMG 文件
        uses: actions/upload-artifact@v4
        with:
          name: 启文-macOS安装包
          path: dist/*.dmg
          retention-days: 30
