name: 编译启文安装包

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: 编译 Windows EXE

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 构建 React 界面
        run: npm run build:renderer
        env:
          CI: 'false'

      - name: 打包 Windows 安装包
        run: npm run build:win -- --publish never

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: 启文-Windows
          path: dist/*.exe
          retention-days: 30
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    name: 编译 macOS DMG

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 构建 React 界面
        run: npm run build:renderer
        env:
          CI: 'false'

      - name: 打包 macOS DMG（跳过签名）
        run: npm run build:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: 上传 DMG
        uses: actions/upload-artifact@v4
        with:
          name: 启文-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30
          if-no-files-found: error
