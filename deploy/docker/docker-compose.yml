version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qiwen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qiwen_db
      POSTGRES_USER: qiwen_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qiwen_user -d qiwen_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qiwen_net

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qiwen_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - qiwen_net

  # ── API Server ──────────────────────────────────────
  api:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile.api
    container_name: qiwen_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://qiwen_user:${POSTGRES_PASSWORD}@postgres:5432/qiwen_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CLIENT_URL: ${CLIENT_URL}
      API_URL: ${API_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    networks:
      - qiwen_net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Nginx reverse proxy ─────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: qiwen_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - qiwen_net

  # ── Watchtower auto-update ──────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: qiwen_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable
    networks:
      - qiwen_net

volumes:
  postgres_data:
  redis_data:
  api_logs:
  nginx_logs:

networks:
  qiwen_net:
    driver: bridge
